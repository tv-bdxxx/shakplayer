<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Live TV</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js">
    </script>
    <script>
        jwplayer.key = "Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            position: fixed;
        }

        #player-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #player {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* --- JWPlayer কাস্টম --- */
        .jw-skin-glow .jw-display-icon-container {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: none !important;
        }
        .jw-skin-glow .jw-button-color {
            color: #ffffff !important;
        }
        .jw-skin-glow .jw-controlbar {
            background: transparent !important;
            backdrop-filter: none !important;
        }

        .jw-video.jw-reset {
            object-fit: fill !important;
        }

        /* --- লোডার (যেমনটি আছে, ঠিক সেভাবেই রাখা হয়েছে) --- */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99;
            flex-direction: column;
            transition: opacity 0.4s ease;
        }

        .loader-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-brand {
            text-align: center;
            z-index: 10;
        }
        .tv-icon {
            font-size: 24px;
            color: #00c3ff;
            text-shadow: 0 0 10px #00c3ff;
        }
        .brand-name {
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            margin-top: 5px;
            letter-spacing: 1px;
        }
        .brand-name span {
            color: #00c3ff;
        }

        .neon-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            animation: rotate-vortex 1.5s linear infinite;
        }
        .neon-ring:nth-child(1) {
            border-top: 2px solid #00c3ff;
            border-right: 2px solid #00c3ff;
            box-shadow: 0 0 10px #00c3ff;
        }
        .neon-ring:nth-child(2) {
            border-bottom: 2px solid #ff007f;
            border-left: 2px solid #ff007f;
            animation-direction: reverse;
            animation-duration: 2s;
            box-shadow: 0 0 10px #ff007f;
        }

        @keyframes rotate-vortex {
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            margin-top: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hide-now {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* এরর মেসেজ */
        .error-content {
            text-align: center;
            color: #fff;
            z-index: 100;
        }
        .error-content i {
            font-size: 40px;
            color: #ff4d4d;
            margin-bottom: 15px;
        }
        .error-content .brand-name {
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        .error-content .brand-name span {
            color: #00c3ff;
        }
        .error-content p {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* ফুলস্ক্রিনে ওরিয়েন্টেশন লক করার জন্য */
        .fullscreen-orientation-lock {
            /* কোন ভিজুয়াল ইফেক্ট নেই, শুধু JS এর জন্য */
        }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <!-- লোডার (ঠিক যেমন আছে, সেভাবেই রাখা) -->
        <div id="loader">
            <div class="loader-container">
                <div class="neon-ring"></div>
                <div class="neon-ring"></div>
                <div class="loader-brand">
                    <i class="fas fa-tv tv-icon"></i>
                    <div class="brand-name">RS LIVE <span>TV</span></div>
                </div>
            </div>
            <div class="loading-text">BUFFERING...</div>
        </div>
        <div id="player"></div>
    </div>

    <script>
        (function() {
            'use strict';

            const urlParams = new URLSearchParams(window.location.search);
            const streamSource = urlParams.get('url');

            // ─── ওরিয়েন্টেশন লক / আনলক ফাংশন ───
            let orientationLocked = false;

            async function lockLandscape() {
                if (!screen.orientation || !screen.orientation.lock) return;
                try {
                    await screen.orientation.lock('landscape');
                    orientationLocked = true;
                } catch (e) {
                    try {
                        await screen.orientation.lock('landscape-primary');
                        orientationLocked = true;
                    } catch (e2) {
                        // কিছু ব্রাউজারে কাজ নাও করতে পারে, সাইলেন্ট
                    }
                }
            }

            async function unlockOrientation() {
                if (!screen.orientation || !screen.orientation.unlock) return;
                if (orientationLocked) {
                    try {
                        await screen.orientation.unlock();
                        orientationLocked = false;
                    } catch (e) { /* সাইলেন্ট */ }
                }
            }

            // ─── ফুলস্ক্রিন ইভেন্ট লিসেন ───
            function handleFullscreenChange() {
                const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
                if (isFs) {
                    lockLandscape();
                } else {
                    unlockOrientation();
                }
            }

            document.addEventListener('fullscreenchange', handleFullscreenChange);
            document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

            // ─── JWPlayer সেটআপ ───
            if (streamSource) {
                const player = jwplayer("player").setup({
                    playlist: [{ file: streamSource, type: "hls" }],
                    width: "100%",
                    height: "100%",
                    autostart: true,
                    stretching: "exactfit",
                    skin: { name: "glow" },
                    displaytitle: false
                });

                player.on("ready", function() {
                    player.setMute(false);
                    player.setVolume(100);
                });

                player.on("play", function() {
                    document.getElementById("loader").classList.add("hide-now");
                });

                player.on("buffer", function() {
                    document.getElementById("loader").classList.remove("hide-now");
                });

                player.on("error", function() {
                    const loader = document.getElementById("loader");
                    loader.classList.remove("hide-now");
                    loader.innerHTML = `
                        <div class="error-content">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Stream Offline!</p>
                            <div class="brand-name">RS LIVE <span>TV</span></div>
                        </div>
                    `;
                });

                // ─── JWPlayer এর ফুলস্ক্রিন বাটনে ক্লিক করলে ওরিয়েন্টেশন লক ───
                // JWPlayer এর fullscreen ইভেন্ট ব্যবহার
                player.on('fullscreen', function(e) {
                    if (e.fullscreen === true) {
                        lockLandscape();
                    } else {
                        unlockOrientation();
                    }
                });

                // এক্সট্রা: প্লেয়ারের ভিতরের ফুলস্ক্রিন বাটন ধরার জন্য
                // কিছু ক্ষেত্রে জেডব্লিউপ্লেয়ার ফুলস্ক্রিন ইভেন্ট আগে ট্রিগার করে,
                // তাই নেটিভ ইভেন্টের সাথেও হুক করা আছে (উপরে fullscreenchange)

                // ─── ম্যানুয়ালি ফুলস্ক্রিন ট্রিগার করলে ওরিয়েন্টেশন লক ───
                // (যদি কেউ অন্য কোনোভাবে ফুলস্ক্রিন করে)

                console.log('✅ RS Live TV (Compact Loader + Rotation)');
                console.log('📺 Stream:', streamSource);

            } else {
                document.getElementById("loader").innerHTML = `
                    <div class="error-content">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>No Stream URL Found</p>
                        <div class="brand-name">RS LIVE <span>TV</span></div>
                    </div>
                `;
            }

            // ─── ব্রাউজার ব্যাকগ্রাউন্ডে গেলে ওরিয়েন্টেশন রিসেট ───
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    // পেজ হাইড হলে আনলক করে দিই (নিরাপত্তার জন্য)
                    unlockOrientation();
                }
            });

        })();
    </script>

</body>
</html>

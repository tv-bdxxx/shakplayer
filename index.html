<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>RS Player</title>

  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html, body {
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      font-family:Arial, sans-serif;
      touch-action:manipulation;
    }

    body {
      position:relative;
    }

    .player-shell{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .video-wrap{
      position:relative;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* Normal mode */
    video,
    .plyr,
    .plyr__video-wrapper {
      width:100%;
      height:100%;
      background:#000;
    }

    /* Normal view এ aspect ratio ঠিক রেখে */
    video {
      object-fit:contain;
    }

    /* Fullscreen এ পুরো screen fill করবে */
    .player-shell:fullscreen video,
    .player-shell:-webkit-full-screen video,
    .player-shell:-moz-full-screen video,
    .player-shell:-ms-fullscreen video,
    .plyr--fullscreen-enabled video,
    .plyr--fullscreen-active video,
    .plyr:fullscreen video,
    .plyr:-webkit-full-screen video {
      object-fit:cover !important;
      width:100vw !important;
      height:100vh !important;
    }

    .plyr {
      --plyr-color-main:#ffffff;
      --plyr-video-control-color:#ffffff;
      --plyr-video-control-color-hover:#ffffff;
      --plyr-menu-background:rgba(18,18,18,.96);
      --plyr-menu-color:#fff;
      --plyr-tooltip-background:rgba(0,0,0,.9);
      --plyr-control-icon-size:18px;
      --plyr-range-thumb-height:14px;
      --plyr-range-thumb-background:#fff;
      --plyr-range-track-height:4px;
    }

    .plyr--video .plyr__controls {
      background:linear-gradient(to top, rgba(0,0,0,.90), rgba(0,0,0,.35), transparent);
      padding:12px 12px calc(12px + env(safe-area-inset-bottom));
    }

    .plyr--full-ui input[type=range] {
      color:#fff;
    }

    .plyr__control--overlaid {
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.15);
      backdrop-filter:blur(8px);
    }

    .loader{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:12px;
      background:#000;
      z-index:30;
      transition:.25s ease;
    }

    .loader.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .spinner{
      width:52px;
      height:52px;
      border-radius:50%;
      border:4px solid rgba(255,255,255,.18);
      border-top-color:#fff;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .error-box{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      background:#000;
      color:#fff;
      padding:20px;
      z-index:40;
    }

    .error-box.show{
      display:flex;
    }

    .error-box h2{
      color:#ff4d4d;
      margin-bottom:10px;
      font-size:22px;
    }

    .error-box p{
      max-width:720px;
      line-height:1.6;
      opacity:.92;
      word-break:break-word;
      font-size:14px;
    }

    .retry-btn{
      margin-top:16px;
      border:none;
      outline:none;
      background:#ff2d55;
      color:#fff;
      padding:11px 18px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
    }

    /* Double tap overlay */
    .seek-zone{
      position:absolute;
      top:0;
      bottom:0;
      width:35%;
      z-index:15;
    }
    .seek-left{ left:0; }
    .seek-right{ right:0; }

    .seek-indicator{
      position:absolute;
      top:50%;
      transform:translateY(-50%) scale(.9);
      min-width:74px;
      height:74px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.45);
      color:#fff;
      font-size:14px;
      font-weight:700;
      backdrop-filter:blur(8px);
      opacity:0;
      transition:.2s ease;
      z-index:16;
      pointer-events:none;
      border:1px solid rgba(255,255,255,.14);
    }
    .seek-indicator.show{
      opacity:1;
      transform:translateY(-50%) scale(1);
    }
    .seek-indicator.left{ left:24px; }
    .seek-indicator.right{ right:24px; }

    /* Mobile fullscreen touch look */
    @media (max-width: 768px){
      .plyr--video .plyr__controls{
        padding:10px 10px calc(10px + env(safe-area-inset-bottom));
      }
      .seek-zone{
        width:38%;
      }
    }
  </style>
</head>
<body>

  <div class="player-shell" id="playerShell">
    <div class="video-wrap">

      <div class="loader" id="loader">
        <div class="spinner"></div>
      </div>

      <div class="error-box" id="errorBox">
        <h2>Stream Error</h2>
        <p id="errorText">No stream URL found.</p>
        <button class="retry-btn" onclick="location.reload()">Reload</button>
      </div>

      <div class="seek-zone seek-left" id="seekLeft"></div>
      <div class="seek-zone seek-right" id="seekRight"></div>
      <div class="seek-indicator left" id="leftIndicator">⏪ 10s</div>
      <div class="seek-indicator right" id="rightIndicator">10s ⏩</div>

      <video id="player" playsinline controls crossorigin="anonymous"></video>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <script>
    function getParam(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    const video = document.getElementById("player");
    const loader = document.getElementById("loader");
    const errorBox = document.getElementById("errorBox");
    const errorText = document.getElementById("errorText");
    const playerShell = document.getElementById("playerShell");

    const seekLeft = document.getElementById("seekLeft");
    const seekRight = document.getElementById("seekRight");
    const leftIndicator = document.getElementById("leftIndicator");
    const rightIndicator = document.getElementById("rightIndicator");

    let streamUrl = getParam("url");
    let type = (getParam("type") || "").toLowerCase();
    let hls = null;
    let dash = null;
    let hideSeekTimer = null;

    function showLoader(){
      loader.classList.remove("hide");
    }

    function hideLoader(){
      loader.classList.add("hide");
    }

    function showError(msg){
      hideLoader();
      errorText.textContent = msg;
      errorBox.classList.add("show");
    }

    function detectType(url){
      const u = (url || "").toLowerCase();
      if(type) return type;
      if(u.includes(".m3u8")) return "hls";
      if(u.includes(".mpd")) return "dash";
      if(u.includes(".mp4")) return "mp4";
      return "auto";
    }

    if(!streamUrl){
      showError("Missing stream URL. Example: ?url=https://example.com/live.m3u8");
    } else {
      try { streamUrl = decodeURIComponent(streamUrl); } catch(e){}

      const player = new Plyr(video, {
        autoplay: true,
        muted: false,
        clickToPlay: true,
        hideControls: true,
        ratio: '16:9',
        controls: [
          'play-large',
          'play',
          'rewind',
          'fast-forward',
          'progress',
          'current-time',
          'mute',
          'volume',
          'settings',
          'fullscreen'
        ],
        settings: ['speed', 'quality'],
        seekTime: 10,
        keyboard: { focused: true, global: true },
        fullscreen: {
          enabled: true,
          fallback: true,
          iosNative: true,
          container: playerShell
        }
      });

      function safePlay(){
        video.play().catch(() => {});
      }

      // Loader events
      video.addEventListener("loadedmetadata", hideLoader);
      video.addEventListener("loadeddata", hideLoader);
      video.addEventListener("canplay", hideLoader);
      video.addEventListener("playing", hideLoader);
      video.addEventListener("waiting", showLoader);
      video.addEventListener("stalled", showLoader);
      video.addEventListener("seeking", showLoader);
      video.addEventListener("seeked", hideLoader);

      video.addEventListener("error", function(){
        showError("ভিডিও চালু করা যাচ্ছে না।");
      });

      const detected = detectType(streamUrl);

      // HLS
      if(detected === "hls" || detected === "auto"){
        if(streamUrl.includes(".m3u8") || detected === "hls"){
          if(Hls.isSupported()){
            hls = new Hls({
              enableWorker:true,
              lowLatencyMode:true,
              backBufferLength:90,
              maxBufferLength:30,
              maxMaxBufferLength:120
            });

            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function(){
              hideLoader();
              safePlay();
            });

            hls.on(Hls.Events.ERROR, function(event, data){
              console.log("HLS Error:", data);
              if(data && data.fatal){
                switch(data.type){
                  case Hls.ErrorTypes.NETWORK_ERROR:
                    hls.startLoad();
                    break;
                  case Hls.ErrorTypes.MEDIA_ERROR:
                    hls.recoverMediaError();
                    break;
                  default:
                    showError("HLS stream load failed.");
                    break;
                }
              }
            });
          } else if(video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            safePlay();
          } else if(detected === "hls") {
            showError("HLS playback not supported on this browser.");
          }
        }
      }

      // DASH
      if((detected === "dash") || (detected === "auto" && streamUrl.includes(".mpd"))){
        try{
          dash = dashjs.MediaPlayer().create();
          dash.initialize(video, streamUrl, true);
          dash.on("streamInitialized", function(){
            hideLoader();
            safePlay();
          });
          dash.on("error", function(){
            showError("DASH stream load failed.");
          });
        }catch(e){
          console.log(e);
          showError("DASH player init failed.");
        }
      }

      // MP4 / fallback
      if(
        detected === "mp4" ||
        (
          detected === "auto" &&
          !streamUrl.includes(".m3u8") &&
          !streamUrl.includes(".mpd")
        )
      ){
        video.src = streamUrl;
        safePlay();
      }

      // Fullscreen এ cover mode জোর করে apply
      function applyFullscreenFit(){
        const fs = document.fullscreenElement || document.webkitFullscreenElement;
        if(fs){
          video.style.objectFit = "cover";
          video.style.width = "100vw";
          video.style.height = "100vh";
        } else {
          video.style.objectFit = "contain";
          video.style.width = "100%";
          video.style.height = "100%";
        }
      }

      document.addEventListener("fullscreenchange", applyFullscreenFit);
      document.addEventListener("webkitfullscreenchange", applyFullscreenFit);

      // Double tap seek
      function flashIndicator(el){
        clearTimeout(hideSeekTimer);
        el.classList.add("show");
        hideSeekTimer = setTimeout(() => {
          el.classList.remove("show");
        }, 450);
      }

      function bindDoubleTap(zone, direction){
        let lastTap = 0;
        zone.addEventListener("touchend", function(e){
          const now = Date.now();
          if(now - lastTap < 300){
            e.preventDefault();
            if(direction === "left"){
              video.currentTime = Math.max(0, video.currentTime - 10);
              flashIndicator(leftIndicator);
            }else{
              video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 10);
              flashIndicator(rightIndicator);
            }
          }
          lastTap = now;
        }, {passive:false});
      }

      bindDoubleTap(seekLeft, "left");
      bindDoubleTap(seekRight, "right");

      // initial
      applyFullscreenFit();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS Shaka Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .shaka-video-container {
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="shaka-video-container" data-shaka-player-container>
    <video autoplay muted playsinline id="video"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        alert("Shaka Player is not supported in this browser!");
        return;
      }

      const video = document.getElementById("video");
      const container = document.querySelector('.shaka-video-container');
      const player = new shaka.Player(video);
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: ['play_pause', 'mute', 'volume', 'spacer', 'quality', 'fullscreen']
      });

      player.configure({
        manifest: {
          retryParameters: { maxAttempts: 3 }
        }
      });

      const params = new URLSearchParams(window.location.search);
      const streamUrl = params.get("url");

      try {
        if (streamUrl) {
          await player.load(streamUrl);
          // ভিডিও লোড成功后 আনমিউট করুন (চাইলে)
          video.muted = True;
          console.log("Video loaded successfully!");
        } else {
          alert("Error: No stream URL provided!");
        }
      } catch (error) {
        console.error("Error Code:", error.code, error);
        alert("Stream load failed! Error Code: " + error.code);
      }
    });
  </script>
</body>
</html>

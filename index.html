<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>RS Live TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest">
    </script>
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── video container ── */
        .video-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #000;
            overflow: hidden;
            z-index: 0;
        }

        video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            pointer-events: none;
        }

        /* ─── LOADER (সুন্দর আরএস লাইভ টিভি লোডার) ─── */
        .loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: #0b0e14;
            z-index: 20;
            transition: opacity 0.7s ease, visibility 0.7s ease;
        }
        .loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .loader .brand .icon {
            font-size: 42px;
            line-height: 1;
            filter: drop-shadow(0 0 20px rgba(0, 195, 255, 0.4));
        }
        .loader .brand .title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #00c3ff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0, 195, 255, 0.2);
        }

        .loader .spinner-wrap {
            position: relative;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loader .spinner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.06);
            border-top-color: #00c3ff;
            animation: spin 1s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            box-shadow: 0 0 30px rgba(0, 195, 255, 0.15);
        }
        .loader .spinner-ring::after {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.04);
            border-bottom-color: #0088ff;
            animation: spin 1.4s cubic-bezier(0.6, 0, 0.4, 1) infinite reverse;
        }
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .loader .status {
            margin-top: 28px;
            font-size: 15px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            animation: pulse-text 1.8s ease-in-out infinite;
        }
        @keyframes pulse-text {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .loader .dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 2px;
        }
        .loader .dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #00c3ff;
            border-radius: 50%;
            animation: dot-bounce 1.4s ease-in-out infinite;
        }
        .loader .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .loader .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes dot-bounce {
            0%,
            80%,
            100% {
                transform: scale(0.4);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── controls overlay ── */
        .controls-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: max(env(safe-area-inset-bottom, 12px), 12px)
                max(env(safe-area-inset-right, 12px), 12px)
                max(env(safe-area-inset-bottom, 20px), 20px)
                max(env(safe-area-inset-left, 12px), 12px);
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }
        .controls-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
        }

        /* ── progress bar ── */
        .progress-track {
            position: relative;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.20);
            border-radius: 99px;
            cursor: pointer;
            touch-action: none;
            transition: height 0.2s ease;
            flex-shrink: 0;
        }
        .progress-track:active,
        .progress-track:hover {
            height: 8px;
        }
        .progress-track .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00c3ff, #0088ff);
            border-radius: 99px;
            transition: width 0.1s linear;
            position: relative;
        }
        .progress-track .progress-fill::after {
            content: '';
            position: absolute;
            right: -7px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .progress-track:active .progress-fill::after,
        .progress-track:hover .progress-fill::after {
            opacity: 1;
        }

        .live-badge {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #ff1744;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.8px;
            padding: 2px 10px 2px 8px;
            border-radius: 99px;
            text-transform: uppercase;
            animation: pulse-live 1.8s ease-in-out infinite;
            display: none;
        }
        .live-badge.active {
            display: block;
        }
        @keyframes pulse-live {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* ── button row ── */
        .button-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            width: 100%;
        }
        .button-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pill-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            height: 44px;
            padding: 0 18px;
            border: none;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            flex-shrink: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            gap: 6px;
            font-weight: 500;
        }
        .pill-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.20);
        }
        .pill-btn svg {
            width: 22px;
            height: 22px;
            fill: #fff;
            stroke: #fff;
            stroke-width: 0;
            flex-shrink: 0;
            display: block;
        }

        .pill-btn.play-btn {
            min-width: 56px;
            height: 56px;
            padding: 0 24px;
            background: rgba(0, 195, 255, 0.85);
            box-shadow: 0 4px 20px rgba(0, 195, 255, 0.35);
        }
        .pill-btn.play-btn:active {
            background: rgba(0, 195, 255, 1);
            transform: scale(0.92);
        }
        .pill-btn.play-btn svg {
            width: 28px;
            height: 28px;
        }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 99px;
            padding: 0 6px 0 12px;
            height: 44px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            flex-shrink: 0;
        }
        .volume-wrap .pill-btn {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 6px !important;
            min-width: 36px !important;
            height: 40px !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        .volume-wrap .pill-btn:active {
            transform: scale(0.90);
            background: transparent !important;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 56px;
            height: 4px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 99px;
            outline: none;
            transition: width 0.25s ease;
            flex-shrink: 0;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }
        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }
        .volume-slider:active {
            width: 80px;
        }

        .time-display {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.3px;
            font-variant-numeric: tabular-nums;
            padding: 0 4px;
            min-width: 52px;
            text-align: center;
            flex-shrink: 0;
        }

        /* ── center play ── */
        .center-play {
            position: fixed;
            inset: 0;
            z-index: 9;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .center-play.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .center-play .big-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 76px;
            height: 76px;
            border-radius: 99px;
            background: rgba(0, 195, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 40px rgba(0, 195, 255, 0.4);
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            touch-action: manipulation;
            border: none;
            outline: none;
        }
        .center-play .big-pill:active {
            transform: scale(0.88);
            background: rgba(0, 195, 255, 1);
        }
        .center-play .big-pill svg {
            width: 38px;
            height: 38px;
            fill: #fff;
            display: block;
        }

        /* ── responsive ── */
        @media (max-width: 480px) {
            .pill-btn {
                min-width: 38px;
                height: 38px;
                padding: 0 12px;
                font-size: 15px;
            }
            .pill-btn svg {
                width: 18px;
                height: 18px;
            }
            .pill-btn.play-btn {
                min-width: 48px;
                height: 48px;
                padding: 0 18px;
            }
            .pill-btn.play-btn svg {
                width: 24px;
                height: 24px;
            }
            .volume-wrap {
                height: 38px;
                padding: 0 4px 0 8px;
            }
            .volume-slider {
                width: 40px;
            }
            .volume-slider:active {
                width: 60px;
            }
            .center-play .big-pill {
                width: 64px;
                height: 64px;
            }
            .center-play .big-pill svg {
                width: 32px;
                height: 32px;
            }
            .time-display {
                font-size: 10px;
                min-width: 44px;
            }
            .progress-track {
                height: 5px;
            }
            .controls-overlay {
                padding: 12px 10px 18px 10px;
            }
            .loader .brand .title {
                font-size: 22px;
            }
            .loader .brand .icon {
                font-size: 34px;
            }
            .loader .spinner-wrap {
                width: 56px;
                height: 56px;
            }
        }

        @media (max-width: 380px) {
            .volume-slider {
                width: 28px;
            }
            .volume-slider:active {
                width: 44px;
            }
            .pill-btn {
                min-width: 34px;
                height: 34px;
                padding: 0 8px;
                font-size: 13px;
            }
            .pill-btn svg {
                width: 16px;
                height: 16px;
            }
            .pill-btn.play-btn {
                min-width: 42px;
                height: 42px;
                padding: 0 14px;
            }
            .pill-btn.play-btn svg {
                width: 20px;
                height: 20px;
            }
            .volume-wrap {
                height: 34px;
                padding: 0 2px 0 6px;
            }
            .center-play .big-pill {
                width: 56px;
                height: 56px;
            }
            .center-play .big-pill svg {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .controls-overlay {
                padding: 8px 16px 12px 16px;
            }
            .controls-wrapper {
                gap: 6px;
            }
            .pill-btn {
                min-width: 34px;
                height: 34px;
                padding: 0 10px;
                font-size: 13px;
            }
            .pill-btn svg {
                width: 16px;
                height: 16px;
            }
            .pill-btn.play-btn {
                min-width: 42px;
                height: 42px;
                padding: 0 14px;
            }
            .pill-btn.play-btn svg {
                width: 20px;
                height: 20px;
            }
            .volume-wrap {
                height: 34px;
                padding: 0 4px 0 8px;
            }
            .volume-slider {
                width: 40px;
            }
            .center-play .big-pill {
                width: 56px;
                height: 56px;
            }
            .center-play .big-pill svg {
                width: 28px;
                height: 28px;
            }
            .progress-track {
                height: 4px;
            }
            .time-display {
                font-size: 10px;
                min-width: 40px;
            }
            .loader .brand .title {
                font-size: 20px;
            }
            .loader .brand .icon {
                font-size: 28px;
            }
            .loader .spinner-wrap {
                width: 48px;
                height: 48px;
            }
            .loader .status {
                font-size: 13px;
                margin-top: 18px;
            }
        }

        video::-webkit-media-controls {
            display: none !important;
        }
        video::-webkit-media-controls-enclosure {
            display: none !important;
        }
        video::-webkit-media-controls-panel {
            display: none !important;
        }
        video::-webkit-media-controls-play-button {
            display: none !important;
        }
        video::-webkit-media-controls-volume-slider {
            display: none !important;
        }
        video::-webkit-media-controls-fullscreen-button {
            display: none !important;
        }
        video::-webkit-media-controls-timeline {
            display: none !important;
        }

        /* ── error ── */
        .error-msg {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.92);
            color: #fff;
            padding: 30px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .error-msg.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .error-msg .err-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .error-msg .err-text {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.8;
            max-width: 320px;
            line-height: 1.5;
        }
        .error-msg .err-retry {
            margin-top: 20px;
            padding: 10px 32px;
            border: none;
            border-radius: 99px;
            background: #00c3ff;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            touch-action: manipulation;
        }
        .error-msg .err-retry:active {
            transform: scale(0.94);
            background: #0099dd;
        }
    </style>
</head>
<body>

    <!-- ─── VIDEO ─── -->
    <div class="video-container">
        <video id="video" playsinline autoplay muted></video>
    </div>

    <!-- ─── SUNDOR LOADER (RS Live TV) ─── -->
    <div class="loader" id="loader">
        <div class="brand">
            <span class="icon">📺</span>
            <span class="title">RS Live TV</span>
        </div>
        <div class="spinner-wrap">
            <div class="spinner-ring"></div>
        </div>
        <div class="status" id="loaderStatus">
            Loading
            <span class="dots">
                <span></span><span></span><span></span>
            </span>
        </div>
    </div>

    <!-- ─── CENTER PLAY ─── -->
    <div class="center-play" id="centerPlay">
        <button class="big-pill" id="centerPlayBtn" aria-label="Play / Pause">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" /></svg>
        </button>
    </div>

    <!-- ─── CONTROLS ─── -->
    <div class="controls-overlay" id="controlsOverlay">
        <div class="controls-wrapper">
            <div class="progress-track" id="progressTrack">
                <div class="progress-fill" id="progressFill"></div>
                <span class="live-badge" id="liveBadge">● LIVE</span>
            </div>
            <div class="button-row">
                <div class="button-group">
                    <button class="pill-btn play-btn" id="playBtn" aria-label="Play / Pause">
                        <svg viewBox="0 0 24 24" id="playIcon"><polygon points="5,3 19,12 5,21" /></svg>
                    </button>
                </div>
                <div class="time-display" id="timeDisplay">0:00</div>
                <div class="button-group">
                    <div class="volume-wrap">
                        <button class="pill-btn" id="volumeBtn" aria-label="Toggle mute">
                            <svg viewBox="0 0 24 24" id="volumeIcon">
                                <path d="M3,9 H7 L12,4 V20 L7,15 H3 Z" />
                                <path d="M16,8 C18,10 18,14 16,16" stroke="white" stroke-width="2" fill="none" />
                                <path d="M19,5 C23,9 23,15 19,19" stroke="white" stroke-width="2" fill="none" />
                            </svg>
                        </button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" aria-label="Volume">
                    </div>
                    <button class="pill-btn" id="fullscreenBtn" aria-label="Toggle fullscreen">
                        <svg viewBox="0 0 24 24" id="fsIcon">
                            <path d="M4,8 V4 H8" stroke="white" stroke-width="2" fill="none" />
                            <path d="M16,4 H20 V8" stroke="white" stroke-width="2" fill="none" />
                            <path d="M20,16 V20 H16" stroke="white" stroke-width="2" fill="none" />
                            <path d="M8,20 H4 V16" stroke="white" stroke-width="2" fill="none" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── ERROR ─── -->
    <div class="error-msg" id="errorMsg">
        <div class="err-icon">📺</div>
        <div class="err-text" id="errorText">Stream unavailable</div>
        <button class="err-retry" id="retryBtn">Retry</button>
    </div>

    <script>
        (function() {
            'use strict';

            // ── DOM refs ──
            const video = document.getElementById('video');
            const loader = document.getElementById('loader');
            const loaderStatus = document.getElementById('loaderStatus');
            const controlsOverlay = document.getElementById('controlsOverlay');
            const centerPlay = document.getElementById('centerPlay');
            const centerPlayBtn = document.getElementById('centerPlayBtn');
            const playBtn = document.getElementById('playBtn');
            const playIcon = document.getElementById('playIcon');
            const progressTrack = document.getElementById('progressTrack');
            const progressFill = document.getElementById('progressFill');
            const timeDisplay = document.getElementById('timeDisplay');
            const volumeBtn = document.getElementById('volumeBtn');
            const volumeIcon = document.getElementById('volumeIcon');
            const volumeSlider = document.getElementById('volumeSlider');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const fsIcon = document.getElementById('fsIcon');
            const liveBadge = document.getElementById('liveBadge');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const retryBtn = document.getElementById('retryBtn');

            // ── state ──
            let isPlaying = false;
            let isMuted = false;
            let isFullscreen = false;
            let controlsVisible = false;
            let controlsTimer = null;
            let isDragging = false;
            let hls = null;
            let streamUrl = null;
            let isLive = false;
            let retryCount = 0;
            const MAX_RETRIES = 3;
            let orientationLocked = false;

            // ── get URL ──
            const urlParam = new URLSearchParams(window.location.search).get('url');
            if (!urlParam) {
                showError('No stream URL provided.');
                loader.classList.add('hidden');
                return;
            }
            streamUrl = decodeURIComponent(urlParam);

            // ── loader status update ──
            function setLoaderStatus(text) {
                loaderStatus.innerHTML = text + ' <span class="dots"><span></span><span></span><span></span></span>';
            }

            // ── controls ──
            function showControls() {
                controlsOverlay.classList.add('visible');
                controlsVisible = true;
                clearTimeout(controlsTimer);
                controlsTimer = setTimeout(() => {
                    if (isPlaying && !isDragging) {
                        controlsOverlay.classList.remove('visible');
                        controlsVisible = false;
                    }
                }, 4000);
            }

            function hideControls() {
                if (!isDragging) {
                    controlsOverlay.classList.remove('visible');
                    controlsVisible = false;
                    clearTimeout(controlsTimer);
                }
            }

            function toggleControls() {
                if (controlsVisible) {
                    hideControls();
                } else {
                    showControls();
                }
            }

            // ── center play ──
            function showCenterPlay(show) {
                if (show) {
                    centerPlay.classList.add('visible');
                    const svg = centerPlayBtn.querySelector('svg');
                    if (isPlaying) {
                        svg.innerHTML = '<rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />';
                    } else {
                        svg.innerHTML = '<polygon points="5,3 19,12 5,21" />';
                    }
                } else {
                    centerPlay.classList.remove('visible');
                }
            }

            function updatePlayIcon(playing) {
                if (playing) {
                    playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />';
                } else {
                    playIcon.innerHTML = '<polygon points="5,3 19,12 5,21" />';
                }
                const cSvg = centerPlayBtn.querySelector('svg');
                if (playing) {
                    cSvg.innerHTML = '<rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />';
                } else {
                    cSvg.innerHTML = '<polygon points="5,3 19,12 5,21" />';
                }
                isPlaying = playing;
                if (playing) {
                    showCenterPlay(false);
                } else {
                    showCenterPlay(true);
                }
            }

            function togglePlay() {
                if (video.paused) {
                    video.play().catch(e => {
                        console.warn('play() failed:', e);
                    });
                } else {
                    video.pause();
                }
            }

            // ── volume ──
            function updateVolumeIcon() {
                if (isMuted || video.volume === 0) {
                    volumeIcon.innerHTML =
                        '<path d="M3,9 H7 L12,4 V20 L7,15 H3 Z" /><line x1="18" y1="6" x2="22" y2="10" stroke="white" stroke-width="2" /><line x1="22" y1="6" x2="18" y2="10" stroke="white" stroke-width="2" />';
                } else if (video.volume < 0.5) {
                    volumeIcon.innerHTML =
                        '<path d="M3,9 H7 L12,4 V20 L7,15 H3 Z" /><path d="M16,8 C18,10 18,14 16,16" stroke="white" stroke-width="2" fill="none" />';
                } else {
                    volumeIcon.innerHTML =
                        '<path d="M3,9 H7 L12,4 V20 L7,15 H3 Z" /><path d="M16,8 C18,10 18,14 16,16" stroke="white" stroke-width="2" fill="none" /><path d="M19,5 C23,9 23,15 19,19" stroke="white" stroke-width="2" fill="none" />';
                }
            }

            function toggleMute() {
                isMuted = !isMuted;
                video.muted = isMuted;
                volumeSlider.value = isMuted ? 0 : (video.volume || 1);
                updateVolumeIcon();
            }

            // ── fullscreen + rotate ──
            async function toggleFullscreenRotate() {
                try {
                    if (document.fullscreenElement || document.webkitFullscreenElement) {
                        if (document.exitFullscreen) await document.exitFullscreen();
                        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                        if (screen.orientation && orientationLocked) {
                            await screen.orientation.unlock();
                            orientationLocked = false;
                        }
                        updateFSIcon();
                        return;
                    }

                    if (screen.orientation && screen.orientation.lock) {
                        try {
                            await screen.orientation.lock('landscape');
                            orientationLocked = true;
                        } catch (err) {
                            try {
                                await screen.orientation.lock('landscape-primary');
                                orientationLocked = true;
                            } catch (e2) {}
                        }
                    }

                    const el = document.documentElement;
                    if (el.requestFullscreen) {
                        await el.requestFullscreen();
                    } else if (el.webkitRequestFullscreen) {
                        el.webkitRequestFullscreen();
                    }
                    updateFSIcon();
                } catch (error) {
                    console.warn('Fullscreen error:', error);
                }
            }

            function updateFSIcon() {
                const fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
                isFullscreen = fs;
                if (fs) {
                    fsIcon.innerHTML =
                        '<path d="M4,12 H8 V8" stroke="white" stroke-width="2" fill="none" /><path d="M16,8 V12 H20" stroke="white" stroke-width="2" fill="none" /><path d="M20,12 H16 V16" stroke="white" stroke-width="2" fill="none" /><path d="M8,16 V12 H4" stroke="white" stroke-width="2" fill="none" />';
                } else {
                    fsIcon.innerHTML =
                        '<path d="M4,8 V4 H8" stroke="white" stroke-width="2" fill="none" /><path d="M16,4 H20 V8" stroke="white" stroke-width="2" fill="none" /><path d="M20,16 V20 H16" stroke="white" stroke-width="2" fill="none" /><path d="M8,20 H4 V16" stroke="white" stroke-width="2" fill="none" />';
                    if (screen.orientation && orientationLocked) {
                        screen.orientation.unlock().catch(() => {});
                        orientationLocked = false;
                    }
                }
            }

            document.addEventListener('fullscreenchange', () => {
                updateFSIcon();
                if (!document.fullscreenElement && orientationLocked) {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock().catch(() => {});
                        orientationLocked = false;
                    }
                }
            });
            document.addEventListener('webkitfullscreenchange', () => {
                updateFSIcon();
                if (!document.webkitFullscreenElement && orientationLocked) {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock().catch(() => {});
                        orientationLocked = false;
                    }
                }
            });

            // ── progress ──
            function updateProgress() {
                if (isDragging) return;
                const dur = video.duration || 0;
                const cur = video.currentTime || 0;
                const pct = dur > 0 ? (cur / dur) * 100 : 0;
                progressFill.style.width = Math.min(pct, 100) + '%';
                if (dur > 0 && !isLive) {
                    timeDisplay.textContent = formatTime(cur) + ' / ' + formatTime(dur);
                } else if (isLive) {
                    timeDisplay.textContent = '🔴 LIVE';
                } else {
                    timeDisplay.textContent = formatTime(cur);
                }
                if (isLive) {
                    liveBadge.classList.add('active');
                } else {
                    liveBadge.classList.remove('active');
                }
            }

            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                const s = Math.floor(seconds);
                const m = Math.floor(s / 60);
                const sec = s % 60;
                return m + ':' + (sec < 10 ? '0' : '') + sec;
            }

            function seekTo(e) {
                const rect = progressTrack.getBoundingClientRect();
                let x = (e.clientX || e.touches?.[0]?.clientX || 0) - rect.left;
                x = Math.max(0, Math.min(x, rect.width));
                const pct = x / rect.width;
                const dur = video.duration || 0;
                if (dur > 0 && !isLive) {
                    video.currentTime = pct * dur;
                }
                progressFill.style.width = (pct * 100) + '%';
            }

            // ── error ──
            function showError(msg) {
                errorText.textContent = msg || 'Stream unavailable';
                errorMsg.classList.add('visible');
                loader.classList.add('hidden');
                controlsOverlay.classList.remove('visible');
                showCenterPlay(false);
            }

            function hideError() {
                errorMsg.classList.remove('visible');
            }

            // ── init HLS ──
            function initHLS(url) {
                hideError();
                loader.classList.remove('hidden');
                setLoaderStatus('Loading');
                retryCount = 0;

                if (hls) {
                    hls.destroy();
                    hls = null;
                }

                isLive = url.includes('live') || url.includes('chunk') || url.includes('m3u8') && !url.includes('vod');

                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backBufferLength: 30,
                        maxBufferLength: 60,
                        manifestLoadingTimeOut: 20000,
                        fragLoadingTimeOut: 20000,
                        abrEwmaDefaultEstimate: 1e6,
                        abrEwmaFastLive: 1,
                        abrEwmaSlowLive: 5,
                        startLevel: -1,
                    });

                    hls.loadSource(url);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        setLoaderStatus('Starting');
                        video.play().catch(e => {
                            console.log('Autoplay blocked:', e);
                            setLoaderStatus('Tap to play');
                            loader.classList.add('hidden');
                            showCenterPlay(true);
                        });
                    });

                    hls.on(Hls.Events.LEVEL_LOADED, () => {
                        const levels = hls.levels || [];
                        if (levels.length > 0) {
                            const level = levels[hls.currentLevel] || levels[0];
                            if (level && level.details) {
                                isLive = level.details.live || false;
                            }
                        }
                    });

                    hls.on(Hls.Events.ERROR, (event, data) => {
                        console.warn('HLS error:', data);

                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    setLoaderStatus('Network error, retrying');
                                    if (retryCount < MAX_RETRIES) {
                                        retryCount++;
                                        setTimeout(() => {
                                            hls.startLoad();
                                        }, 2000);
                                    } else {
                                        showError('Network error. Check connection.');
                                    }
                                    break;

                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    setLoaderStatus('Media error, recovering');
                                    hls.recoverMediaError();
                                    break;

                                default:
                                    showError('Stream not supported or unavailable.');
                                    break;
                            }
                        } else {
                            if (data.details === 'manifestLoadError' || data.details === 'manifestLoadTimeout') {
                                if (retryCount < MAX_RETRIES) {
                                    retryCount++;
                                    setLoaderStatus('Retrying (' + retryCount + '/' + MAX_RETRIES + ')');
                                    setTimeout(() => {
                                        hls.startLoad();
                                    }, 1500);
                                } else {
                                    showError('Could not load stream.');
                                }
                            }
                        }
                    });

                    video.addEventListener('playing', () => {
                        loader.classList.add('hidden');
                        hideError();
                        updatePlayIcon(true);
                        showControls();
                        if (hls && hls.levels && hls.levels.length > 0) {
                            const level = hls.levels[hls.currentLevel] || hls.levels[0];
                            if (level && level.details) {
                                isLive = level.details.live || false;
                            }
                        }
                        if (isLive) {
                            liveBadge.classList.add('active');
                            timeDisplay.textContent = '🔴 LIVE';
                        }
                    });

                    video.addEventListener('pause', () => {
                        updatePlayIcon(false);
                        showCenterPlay(true);
                        showControls();
                    });

                    video.addEventListener('waiting', () => {
                        loader.classList.remove('hidden');
                        setLoaderStatus('Buffering');
                    });

                    video.addEventListener('canplay', () => {
                        loader.classList.add('hidden');
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', () => {
                        isLive = video.duration === Infinity || isNaN(video.duration);
                        if (isLive) {
                            liveBadge.classList.add('active');
                            timeDisplay.textContent = '🔴 LIVE';
                        }
                        video.play().catch(() => {
                            showCenterPlay(true);
                        });
                        loader.classList.add('hidden');
                    });
                    video.addEventListener('error', () => {
                        showError('Cannot play this stream.');
                    });
                } else {
                    showError('HLS not supported in this browser.');
                }
            }

            function retryStream() {
                hideError();
                if (streamUrl) {
                    initHLS(streamUrl);
                } else {
                    showError('No stream URL.');
                }
            }

            // ── event bindings ──
            playBtn.addEventListener('click', togglePlay);
            centerPlayBtn.addEventListener('click', togglePlay);

            video.addEventListener('click', toggleControls);
            document.querySelector('.video-container').addEventListener('click', (e) => {
                if (e.target === video || e.target.closest('.video-container')) {
                    toggleControls();
                }
            });

            progressTrack.addEventListener('mousedown', (e) => {
                isDragging = true;
                seekTo(e);
                showControls();
            });
            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    seekTo(e);
                }
            });
            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    showControls();
                }
            });

            progressTrack.addEventListener('touchstart', (e) => {
                isDragging = true;
                seekTo(e);
                showControls();
            }, { passive: true });
            progressTrack.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    seekTo(e);
                }
            }, { passive: true });
            progressTrack.addEventListener('touchend', () => {
                isDragging = false;
                showControls();
            }, { passive: true });

            volumeSlider.addEventListener('input', () => {
                const val = parseFloat(volumeSlider.value);
                video.volume = val;
                video.muted = (val === 0);
                isMuted = (val === 0);
                updateVolumeIcon();
            });
            volumeBtn.addEventListener('click', toggleMute);

            fullscreenBtn.addEventListener('click', toggleFullscreenRotate);

            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    togglePlay();
                }
                if (e.key === 'f' || e.key === 'F') {
                    toggleFullscreenRotate();
                }
                if (e.key === 'ArrowRight') {
                    video.currentTime = Math.min(video.currentTime + 10, video.duration || 0);
                }
                if (e.key === 'ArrowLeft') {
                    video.currentTime = Math.max(video.currentTime - 10, 0);
                }
            });

            video.addEventListener('timeupdate', updateProgress);

            video.addEventListener('volumechange', () => {
                isMuted = video.muted;
                volumeSlider.value = isMuted ? 0 : video.volume;
                updateVolumeIcon();
            });

            retryBtn.addEventListener('click', retryStream);

            // ── start ──
            if (streamUrl) {
                initHLS(streamUrl);
            }

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && isPlaying) {
                    setTimeout(hideControls, 3000);
                }
            });

            document.addEventListener('contextmenu', (e) => e.preventDefault());

            window.__player = { video, hls, togglePlay, toggleFullscreenRotate, retryStream };

            setTimeout(showControls, 500);

            console.log('🎬 RS Live TV Player with elegant loader');
            console.log('📺 Stream:', streamUrl);

        })();
    </script>

</body>
</html>

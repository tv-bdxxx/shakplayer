<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RS Shaka Premium Player</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .shaka-video-container {
      width: 100% !important;
      height: 100% !important;
    }
    video {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
      transition: object-fit 0.2s ease;
    }

    /* 📱 জুম ও স্ট্রেচ মোড সেটিংস */
    video.zoom-mode { object-fit: cover !important; }
    video.stretch-mode { object-fit: fill !important; }

    /* 🎛️ প্রিমিয়াম থ্রি-ডট ড্রপডাউন মেনুর স্টাইল (৩ নম্বর স্ক্রিনশটের মতো) */
    .shaka-zoom-menu {
      background: rgba(32, 32, 32, 0.95);
      border-radius: 6px;
      padding: 5px;
      display: none;
      position: absolute;
      bottom: 60px;
      right: 15px;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .shaka-zoom-menu button {
      display: block;
      width: 120px;
      background: none;
      border: none;
      color: #fff;
      padding: 10px;
      text-align: left;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
    }
    .shaka-zoom-menu button:hover {
      background: #e50914; /* প্রিমিয়াম রেড থিম */
    }
    .shaka-zoom-menu button.active {
      background: #e50914;
    }
  </style>
</head>
<body>

  <div class="shaka-video-container" data-shaka-player-container>
    <video autoplay playsinline id="video"></video>
    
    <div class="shaka-zoom-menu" id="zoomMenu">
      <button id="btn-orig" class="active">Original</button>
      <button id="btn-stretch">Stretch</button>
      <button id="btn-zoom">Fill (Zoom)</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        alert("Shaka Player is not supported in this browser!");
        return;
      }

      const video = document.getElementById("video");
      const container = document.querySelector('.shaka-video-container');
      const player = new shaka.Player(video);
      const ui = new shaka.ui.Overlay(player, container, video);

      // কন্ট্রোল প্যানেল কনফিগারেশন
      ui.configure({
        controlPanelElements: ['play_pause', 'mute', 'volume', 'spacer', 'quality', 'fullscreen']
      });

      player.configure({
        manifest: { retryParameters: { maxAttempts: 5, baseDelay: 1000 } }
      });

      // ⚙️ কন্ট্রোল বারে প্রিমিয়াম গিয়ার/থ্রি-ডট এর মতো জুম বাটন যোগ করার লজিক
      const controlPanel = container.querySelector('.shaka-control-panel');
      const zoomMenuBtn = document.createElement('button');
      zoomMenuBtn.classList.add('shaka-fullscreen-button', 'shaka-no-propagation');
      // SVG দিয়ে একটি সুন্দর ডিসপ্লে/আspect রেশিও আইকন তৈরি
      zoomMenuBtn.innerHTML = `<svg fill="#ffffff" height="20px" width="20px" viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6z"/></svg>`;
      zoomMenuBtn.style.cursor = 'pointer';
      
      const fullscreenBtn = controlPanel.querySelector('.shaka-fullscreen-button');
      if (fullscreenBtn) {
        controlPanel.insertBefore(zoomMenuBtn, fullscreenBtn);
      } else {
        controlPanel.appendChild(zoomMenuBtn);
      }

      // ড্রপডাউন মেনু শো/হাইড লজিক
      const zoomMenu = document.getElementById('zoomMenu');
      zoomMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        zoomMenu.style.display = zoomMenu.style.display === 'block' ? 'none' : 'block';
      });

      document.addEventListener('click', () => {
        zoomMenu.style.display = 'none';
      });

      // মোড পরিবর্তন করার লজিক
      const buttons = {
        orig: document.getElementById('btn-orig'),
        stretch: document.getElementById('btn-stretch'),
        zoom: document.getElementById('btn-zoom')
      };

      function setZoomMode(mode, activeBtn) {
        video.className = mode;
        Object.values(buttons).forEach(btn => btn.classList.remove('active'));
        activeBtn.classList.add('active');
        zoomMenu.style.display = 'none';
      }

      buttons.orig.addEventListener('click', () => setZoomMode('', buttons.orig));
      buttons.stretch.addEventListener('click', () => setZoomMode('stretch-mode', buttons.stretch));
      buttons.zoom.addEventListener('click', () => setZoomMode('zoom-mode', buttons.zoom));

      // 🔗 ইউআরএল থেকে ভিডিওর সঠিক লিংক রিড করা
      const params = new URLSearchParams(window.location.search);
      const streamUrl = params.get("url");

      try {
        if (streamUrl) {
          await player.load(decodeURIComponent(streamUrl));
          video.muted = false; // এখানে জাভাস্ক্রিপ্টের ছোট হাতের true/false ব্যবহার করা হয়েছে
          console.log("Video loaded successfully!");
        }
      } catch (error) {
        console.error("Error Code:", error.code, error);
        // যদি এরর কোড না থাকে তবে পপআপ না দেখিয়ে কনসোলে রাখবে
        if(error.code) {
          alert("Stream load failed! Error Code: " + error.code);
        }
      }
    });
  </script>
</body>
</html>

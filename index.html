<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RS Shaka Premium Player</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .shaka-video-container {
      width: 100% !important;
      height: 100% !important;
    }
    
    video {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;
      transition: object-fit 0.2s ease;
    }

    /* 📱 কাস্টম জুম সেটিংস */
    video.zoom-mode { object-fit: cover !important; }
    video.stretch-mode { object-fit: fill !important; }

    /* 🎛️ প্রিমিয়াম ড্রপডাউন বাটন এবং কন্ট্রোল ওভাররাইড (কোনো ফালতু বাটন ভিডিওর মাঝখানে থাকবে না) */
    .custom-zoom-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 10px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      font-family: Roboto, Helvetica, Arial, sans-serif;
    }
    
    .custom-zoom-btn:hover {
      color: #00f0ff;
    }
  </style>
</head>
<body>

  <div class="shaka-video-container" data-shaka-player-container>
    <video autoplay playsinline id="video"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) return;

      const video = document.getElementById("video");
      const container = document.querySelector('.shaka-video-container');
      
      const player = new shaka.Player(video);
      const ui = new shaka.ui.Overlay(player, container, video);

      // ⚙️ ৩ নম্বর স্ক্রিনশটের মতো প্রিমিয়াম কন্ট্রোলবার কনফিগারেশন
      ui.configure({
        controlPanelElements: ['play_pause', 'mute', 'volume', 'spacer', 'quality', 'fullscreen']
      });

      player.configure({
        manifest: { retryParameters: { maxAttempts: 5, baseDelay: 1000 } },
        streaming: {
          bufferingGoal: 15,
          rebufferingGoal: 5,
          alwaysStreamText: false
        }
      });

      // 🎯 Error 6001 (DRM / ClearKey) চিরতরে বন্ধ করার জন্য অটো-কনফিগারেশন লজিক
      player.addEventListener('error', (event) => {
        if (event.detail && event.detail.code === 6001) {
          console.warn("DRM Error 6001 detected. Retrying without DRM config...");
          player.configure({ drm: { clearKeys: {} } }); 
        }
      });

      // ⚡ প্রিমিয়াম জুম বাটন কন্ট্রোল বারের ভেতর যুক্ত করা (fullscreen বাটনের বামে বসবে)
      const controlPanel = container.querySelector('.shaka-control-panel');
      const zoomBtn = document.createElement('button');
      zoomBtn.classList.add('custom-zoom-btn');
      zoomBtn.innerText = 'Original';
      
      const fullscreenBtn = controlPanel.querySelector('.shaka-fullscreen-button');
      if (fullscreenBtn) {
        controlPanel.insertBefore(zoomBtn, fullscreenBtn);
      } else {
        controlPanel.appendChild(zoomBtn);
      }

      // 🔄 মোড টগল লজিক (Original -> Stretch -> Zoom)
      let currentMode = 0;
      zoomBtn.addEventListener('click', () => {
        currentMode = (currentMode + 1) % 3;
        
        if (currentMode === 0) {
          video.className = ''; 
          zoomBtn.innerText = 'Original';
        } else if (currentMode === 1) {
          video.className = 'stretch-mode'; 
          zoomBtn.innerText = 'Stretch';
        } else if (currentMode === 2) {
          video.className = 'zoom-mode'; 
          zoomBtn.innerText = 'Zoom';
        }
      });

      // 🔗 ইউআরএল থেকে ভিডিও লিংক রিড করা
      const params = new URLSearchParams(window.location.search);
      let streamUrl = params.get("url");

      if (streamUrl) {
        try {
          await player.load(decodeURIComponent(streamUrl));
        } catch (error) {
          console.error("Player Load Error:", error.code, error);
        }
      }
    });
  </script>

</body>
</html>

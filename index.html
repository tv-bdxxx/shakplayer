<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Full Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        /* ভিডিও কন্টেইনার এবং ভিডিওর আকার নির্ধারণ */
        .plyr--video { width: 100vw; height: 100vh; }
        
        video { 
            width: 100%; height: 100%; 
            /* ভিডিও কাটবে না এবং অনুপাত ঠিক রেখে স্ক্রিনে ফিট হবে */
            object-fit: contain; 
            background-color: #000;
        }
    </style>
</head>
<body>

<video id="player" autoplay playsinline muted controls>
    <source type="application/vnd.apple.mpegurl" src="">
</video>

<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoSrc = urlParams.get('url');
    const video = document.getElementById('player');
    
    if (videoSrc) { video.querySelector('source').src = videoSrc; }

    document.addEventListener("DOMContentLoaded", () => {
        const player = new Plyr(video, {
            fullscreen: { enabled: true, fallback: true, iosNative: true }
        });

        if (Hls.isSupported() && videoSrc) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        }

        // ফুলস্ক্রিন হলে ল্যান্ডস্কেপ মোড লক করা
        player.on('enterfullscreen', () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RS Shaka Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  <style>
    html, body { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; }
    .shaka-video-container { width: 100% !important; height: 100% !important; }
    video { width: 100% !important; height: 100% !important; object-fit: contain; transition: object-fit 0.2s ease; }
    video.zoom-mode { object-fit: cover !important; }
    video.stretch-mode { object-fit: fill !important; }
    .custom-zoom-btn { background: none; border: none; color: white; font-size: 14px; font-weight: bold; cursor: pointer; padding: 0 10px; height: 100%; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="shaka-video-container" data-shaka-player-container>
    <video autoplay playsinline id="video"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) { return; }

      const video = document.getElementById("video");
      const container = document.querySelector('.shaka-video-container');
      const player = new shaka.Player(video);
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: ['play_pause', 'mute', 'volume', 'spacer', 'quality', 'fullscreen']
      });

      player.configure({
        manifest: { retryParameters: { maxAttempts: 3 } }
      });

      // জুম বাটন লজিক
      const controlPanel = container.querySelector('.shaka-control-panel');
      const zoomBtn = document.createElement('button');
      zoomBtn.classList.add('custom-zoom-btn');
      zoomBtn.innerText = 'Original';
      
      const fullscreenBtn = controlPanel.querySelector('.shaka-fullscreen-button');
      if (fullscreenBtn) { controlPanel.insertBefore(zoomBtn, fullscreenBtn); } 
      else { controlPanel.appendChild(zoomBtn); }

      let currentMode = 0;
      zoomBtn.addEventListener('click', () => {
        currentMode = (currentMode + 1) % 3;
        if (currentMode === 0) { video.className = ''; zoomBtn.innerText = 'Original'; } 
        else if (currentMode === 1) { video.className = 'stretch-mode'; zoomBtn.innerText = 'Stretch'; } 
        else if (currentMode === 2) { video.className = 'zoom-mode'; zoomBtn.innerText = 'Zoom'; }
      });

      // 🎯 ইউআরএল রিড করার সঠিক লজিক
      const params = new URLSearchParams(window.location.search);
      const streamUrl = params.get("url");

      try {
        if (streamUrl) {
          // কিছু ব্রাউজারে লিংক ডিকোড করতে সমস্যা হয়, তাই এখানে decodeURIComponent করা হয়েছে
          await player.load(decodeURIComponent(streamUrl));
        }
      } catch (error) {
        console.error("Error Code:", error.code);
      }
    });
  </script>
</body>
</html>

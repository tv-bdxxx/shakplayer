<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://content.jwplatform.com/libraries/YOUR_JW_PLAYER_KEY.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #player-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="player-container"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('url');

    var player = jwplayer("player-container").setup({
        file: videoUrl,
        autostart: true,
        mute: false,
        stretching: "uniform", // এটিই আপনার পছন্দের Center Crop (Zoom) এর বিকল্প
        width: "100%",
        height: "100%",
        abouttext: "Player",
        playbackRateControls: [0.5, 1, 1.5, 2],
        pipIcon: "enabled"
    });

    // Double Tap Seek (Custom Logic)
    let lastTap = 0;
    player.getContainer().addEventListener('touchend', function(e) {
        let currentTime = new Date().getTime();
        let tapLength = currentTime - lastTap;
        if (tapLength < 500 && tapLength > 0) {
            player.seek(player.getPosition() + 10);
            e.preventDefault();
        }
        lastTap = currentTime;
    });
</script>
</body>
</html>

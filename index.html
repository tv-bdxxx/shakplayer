<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RS Live TV - Clean Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:sans-serif;}

.video-container{
  width:100vw;
  height:100vh;
  position:relative;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* Loader */
.loader{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:#000;
  color:#fff;
  z-index:10;
}

.spinner{
  width:50px;
  height:50px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #00c3ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

.msg{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="video-container">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="msg" id="msg">Loading Stream...</div>
  </div>

  <video id="video" controls playsinline autoplay muted></video>
</div>

<script>
const video = document.getElementById("video");
const loader = document.getElementById("loader");
const msg = document.getElementById("msg");

const url = new URLSearchParams(window.location.search).get("url");

if(!url){
  msg.innerText = "No Stream URL Found";
} else {

  const streamUrl = decodeURIComponent(url);

  if(Hls.isSupported()){
    const hls = new Hls({
      enableWorker:true,
      lowLatencyMode:true,
      backBufferLength:30,
      maxBufferLength:60,
      manifestLoadingTimeOut:15000,
      fragLoadingTimeOut:15000
    });

    hls.loadSource(streamUrl);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(e => {
        console.log("Autoplay blocked:", e);
        msg.innerText = "Tap to Play";
        loader.style.display = "none";
      });
    });

    hls.on(Hls.Events.ERROR, (event, data) => {
      console.log("HLS ERROR:", data);

      if(data.fatal){
        switch(data.type){
          case Hls.ErrorTypes.NETWORK_ERROR:
            msg.innerText = "Network Error - Retrying...";
            hls.startLoad();
            break;

          case Hls.ErrorTypes.MEDIA_ERROR:
            msg.innerText = "Media Error - Recovering...";
            hls.recoverMediaError();
            break;

          default:
            msg.innerText = "Stream Not Supported / Blocked";
            loader.style.display = "flex";
            break;
        }
      }
    });

    video.addEventListener("playing", () => {
      loader.style.display = "none";
    });

    video.addEventListener("waiting", () => {
      loader.style.display = "flex";
      msg.innerText = "Buffering...";
    });

  } else if(video.canPlayType("application/vnd.apple.mpegurl")){
    video.src = streamUrl;
    video.addEventListener("loadedmetadata", () => {
      video.play();
      loader.style.display = "none";
    });
  } else {
    msg.innerText = "HLS Not Supported";
  }
}
</script>

</body>
</html>
